<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ウォーターカラーパズル</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="favicon.png">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #bb86fc;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            width: 100%;
            padding: 20px;
            text-align: center;
        }

        .header-section { margin-bottom: 20px; }
        
        /* ポータルページへ戻るボタン スタイル */
        .back-link {
            display: block;
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 6px;
            padding: 0 20px;
            text-decoration: none;
            color: var(--text-color);
            height: 40px;
            line-height: 38px;
            text-align: center;
            float: right;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .back-link:hover {
            color: var(--accent-color);
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(187, 134, 252, 0.1);
        }

        h1 { font-size: 1.4rem; font-weight: 700; color: #fff; text-align: left; }
        .level-badge {
            display: inline-block;
            background: var(--card-bg);
            border: 1px solid #333;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--accent-color);
        }

        .tube-wrap {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(40px, 1fr));
            gap: 25px 12px;
            justify-items: center;
            padding: 25px 5px;
            max-width: 100%;
            clear: both; /* float解除 */
        }

        .tube {
            width: 34px;
            height: 130px;
            border: 2px solid #444;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.02);
            display: flex;
            flex-direction: column-reverse;
            overflow: hidden;
        }

        .tube-active {
            transform: translateY(-15px);
            border-color: var(--accent-color);
            box-shadow: 0 5px 15px rgba(187, 134, 252, 0.2);
        }

        .water-layer {
            width: 100%;
            height: 25%;
            transition: background-color 0.4s ease;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .message-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 15px 30px;
            border-radius: 12px;
            border: 1px solid var(--accent-color);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }

        .message-toast.show { opacity: 1; }
        .footer-info { margin-top: 30px; font-size: 0.75rem; color: #555; }
    </style>
</head>
<body>
<div id="app" class="container">
    <div class="header-section">
        <div class="row align-items-center g-2">
            <div class="col text-start">
                <h1>ウォーターカラーパズル</h1>
                <div class="level-badge">LEVEL {{ currLevel + 1 }}</div>
            </div>
            <div class="col-auto">
                <a href="../" class="back-link">← ポータルページへ戻る</a>
            </div>
        </div>
    </div>

    <div class="tube-wrap">
        <div v-for="(tube, tIdx) in state" 
             :key="tIdx" 
             class="tube" 
             :class="{'tube-active': activeTube === tIdx}"
             @click="handleClickTube(tIdx)">
            <div v-for="(colorIdx, lIdx) in 4" 
                 :key="lIdx" 
                 class="water-layer"
                 :style="{ backgroundColor: getColor(tube, lIdx) }">
            </div>
        </div>
    </div>

    <div class="footer-info">
        ステージ1から4色で開始。5ステージごとに色が1色（4ブロック）増えます
    </div>

    <div class="message-toast" :class="{show: msg}">
        {{ msg }}
    </div>
</div>

<script src="https://unpkg.com/vue@3.2.33/dist/vue.global.prod.js"></script>

<script>
const ALL_COLORS = [
    "#e34d59", "#ffe478", "#85dbbe", "#85daff", "#266fe8", "#834ec2", 
    "#c5c5c5", "#ffd1fc", "#ed7b2f", "#754c00", "#067945", "#001f97",
    "#ed49b4", "#5f7292", "#9b006b", "#5e5e5e"
];

const { createApp, ref } = Vue;

createApp({
    setup() {
        const activeTube = ref(null);
        const currLevel = ref(0);
        const state = ref([]);
        const msg = ref("");
        const nLayers = 4;

        const generateLevel = (level) => {
            const baseColors = 4; 
            const stageOffset = Math.floor((level - 1) / 5);
            const numColors = Math.min(baseColors + stageOffset, ALL_COLORS.length);
            const numEmpty = 2;
            
            let data = [];
            for (let i = 0; i < numColors; i++) {
                data.push(new Array(nLayers).fill(i));
            }
            for (let i = 0; i < numEmpty; i++) {
                data.push([]);
            }

            let steps = 0;
            const maxShuffles = numColors * 100;
            while (steps < maxShuffles) {
                const from = Math.floor(Math.random() * data.length);
                const to = Math.floor(Math.random() * data.length);
                if (from === to) continue;
                
                if (data[from].length > 0 && data[to].length < nLayers) {
                    data[to].push(data[from].pop());
                    steps++;
                }
            }
            return data;
        };

        const loadLevel = () => {
            state.value = generateLevel(currLevel.value);
            activeTube.value = null;
        };

        const handleClickTube = (idx) => {
            if (activeTube.value === null) {
                if (state.value[idx].length > 0) activeTube.value = idx;
            } else {
                const fromIdx = activeTube.value;
                const toIdx = idx;

                if (fromIdx === toIdx) {
                    activeTube.value = null;
                    return;
                }

                const fromTube = state.value[fromIdx];
                const toTube = state.value[toIdx];

                const canMove = fromTube.length > 0 && 
                                toTube.length < nLayers && 
                                (toTube.length === 0 || toTube[toTube.length - 1] === fromTube[fromTube.length - 1]);

                if (canMove) {
                    const color = fromTube.pop();
                    toTube.push(color);
                    while (fromTube.length > 0 && 
                           fromTube[fromTube.length - 1] === color && 
                           toTube.length < nLayers) {
                        toTube.push(fromTube.pop());
                    }
                    activeTube.value = null;
                    checkWin();
                } else {
                    activeTube.value = idx;
                }
            }
        };

        const checkWin = () => {
            const isWin = state.value.every(tube => {
                return tube.length === 0 || (tube.length === nLayers && new Set(tube).size === 1);
            });

            if (isWin) {
                showToast("SUCCESS!");
                setTimeout(() => {
                    currLevel.value++;
                    localStorage.setItem('waterSort_level_save', currLevel.value);
                    loadLevel();
                }, 1000);
            }
        };

        const showToast = (text) => {
            msg.value = text;
            setTimeout(() => msg.value = "", 1500);
        };

        const getColor = (tube, lIdx) => {
            const colorId = tube[lIdx];
            return colorId !== undefined ? ALL_COLORS[colorId % ALL_COLORS.length] : "transparent";
        };

        const saved = localStorage.getItem('waterSort_level_save');
        if (saved) {
            const parsedLevel = parseInt(saved, 10);
            if (!isNaN(parsedLevel) && parsedLevel >= 0) {
                currLevel.value = parsedLevel;
            } else {
                currLevel.value = 0;
            }
        } else {
            currLevel.value = 0;
        }
        loadLevel();

        return { state, activeTube, currLevel, msg, handleClickTube, getColor };
    }
}).mount('#app');
</script>
</body>
</html>
