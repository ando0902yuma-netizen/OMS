<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="./clock.png">
    <title>OMS - 秒単位時計</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --accent-color: #007aff;
            --border-radius: 16px;
            --border-color: #e5e7eb;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
        }

        /* 戻るボタン */
        .btn-back {
            position: absolute;
            top: 20px;
            left: 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-back:hover {
            border-color: var(--accent-color);
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.1);
            transform: translateY(-1px);
        }

        .clock-container {
            background: var(--card-bg);
            padding: 30px 40px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-sizing: border-box;
        }

        .date-display {
            font-size: 16px;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .time-display {
            font-size: 48px;
            font-weight: 700;
            color: var(--text-main);
            font-variant-numeric: tabular-nums;
            letter-spacing: 1px;
        }

        .sec-dot {
            color: var(--accent-color);
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <a href="../" class="btn-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        戻る
    </a>

    <div class="clock-container">
        <div class="date-display" id="date">0000年00月00日 (水)</div>
        <div class="time-display">
            <span id="hours">00</span><span class="sec-dot">:</span><span id="minutes">00</span><span class="sec-dot">:</span><span id="seconds">00</span>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();

            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const dayOfWeek = ['日', '月', '火', '水', '木', '金', '土'][now.getDay()];

            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            document.getElementById('date').textContent = `${year}年${month}月${date}日 (${dayOfWeek})`;
            document.getElementById('hours').textContent = hours;
            document.getElementById('minutes').textContent = minutes;
            document.getElementById('seconds').textContent = seconds;
        }

        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
