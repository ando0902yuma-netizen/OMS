<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMS - Webアプリ</title>
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <link rel="stylesheet" href="/chat/css/style.css">
    <style>
        /* アプリ選択レイアウト */
        .app-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 24px; width: 100%; box-sizing: border-box; }
        
        @media (min-width: 600px) {
            .app-grid { grid-template-columns: repeat(2, 1fr); }
        }

        /* アプリカード */
        .app-card { display: flex; flex-direction: column; border: 1px solid var(--border-color); border-radius: 16px; background: #ffffff; text-decoration: none; color: var(--text-main); transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.02); box-sizing: border-box; overflow: hidden; }
        .app-card:hover { border-color: var(--primary); box-shadow: 0 8px 16px var(--primary-glow); transform: translateY(-4px); }
        
        /* サムネイルウインドウ */
        .app-thumbnail { height: 140px; background: var(--bg-other); display: flex; align-items: center; justify-content: center; border-bottom: 1px solid var(--border-color); user-select: none; padding: 16px; box-sizing: border-box; }
        
        /* 中の画像自体に角丸（border-radius）を適用 */
        .app-thumbnail img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 12px; }
        
        .app-body { padding: 20px; text-align: left; display: flex; flex-direction: column; gap: 8px; flex: 1; }
        .app-title { font-weight: bold; font-size: 18px; color: var(--text-main); }
        .app-desc { font-size: 13px; color: var(--text-muted); line-height: 1.5; flex: 1; }
        
        .app-badge { align-self: flex-start; background: #e0f2fe; color: #0369a1; padding: 2px 8px; font-size: 11px; border-radius: 6px; font-weight: bold; }
        
        .back-link { display: inline-block; margin-top: 24px; color: var(--primary); text-decoration: none; font-size: 14px; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container chat-container">
        <h1>OMS WEB APP</h1>
        <hr>
        <a href="/" class="back-link">← メインページへ戻る</a>

        <div class="app-grid">
            
            <a href="clock/index.html" class="app-card">
                <div class="app-thumbnail">
                    <img src="/images/Web-App/clock.png" alt="OMS 時計">
                </div>
                <div class="app-body">
                    <span class="app-badge">時間</span>
                    <div class="app-title">OMS clock</div>
                    <div class="app-desc">シンプルな時計アプリ。時間を正確に表示し、便利に使いましょう&#x21;</div>
                </div>
            </a>
            
            <a href="camera/index.html" class="app-card">
                <div class="app-thumbnail">
                    <img src="/images/Web-App/camera.png" alt="OMS カメラ">
                </div>
                <div class="app-body">
                    <span class="app-badge">写真</span>
                    <div class="app-title">OMS カメラ</div>
                    <div class="app-desc">シンプルなカメラアプリ。写真を無音で撮影しましょう&#x21;</div>
                </div>
            </a>
            <a href="calendar/index.html" class="app-card">
                <div class="app-thumbnail">
                    <img src="/images/Web-App/calendar.png" alt="OMS カレンダー">
                </div>
                <div class="app-body">
                    <span class="app-badge">日程</span>
                    <div class="app-title">OMS カレンダー</div>
                    <div class="app-desc">シンプルなカレンダーアプリ。日程を管理しましょう&#x21;</div>
                </div>
            </a>
            <a href="calculator/index.html" class="app-card">
                <div class="app-thumbnail">
                    <img src="/images/Web-App/calculator.png" alt="OMS 計算機">
                </div>
                <div class="app-body">
                    <span class="app-badge">計算</span>
                    <div class="app-title">OMS 計算機</div>
                    <div class="app-desc">シンプルな計算機アプリ。基本的な計算を簡単に行いましょう&#x21;</div>
                </div>
            </a>
        </div>

        <div style="text-align: center; font-size: 12px; color: #555555; margin-top: 40px;">
            <p>©2026 Online Messages Service. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
