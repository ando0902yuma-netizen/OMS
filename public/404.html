<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ページが見つかりませんでした (404 Not Found)</title>
</head>
<body style="font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif; background-color: #f8f9fa; color: #333333; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center;">

    <div style="max-width: 600px; padding: 40px 20px;">
        <!-- 404の数字 -->
        <div style="font-size: 120px; font-weight: bold; color: #007bff; line-height: 1; margin-bottom: 20px;">404</div>
        
        <!-- メッセージ -->
        <h1 style="font-size: 28px; margin-bottom: 15px; color: #222222;">お探しのページが見つかりません</h1>
        <p style="font-size: 16px; line-height: 1.6; color: #666666; margin-bottom: 40px;">
            アクセスしようとしたページは削除されたか、URLが変更された可能性があります。<br>
            入力したURLが正しいかもう一度ご確認ください。
        </p>

        <!-- ナビゲーションボタン -->
        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;">
            <!-- 主要ボタン（青色） -->
            <a href="/" style="display: inline-block; padding: 12px 24px; font-size: 15px; font-weight: bold; text-decoration: none; border-radius: 4px; background-color: #007bff; color: #ffffff;">
                トップページへ戻る
            </a>
            </a>
        </div>
    </div>

</body>
</html>
